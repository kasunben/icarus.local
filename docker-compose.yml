# icarus.local — on-demand service stack
# Usage: make up SERVICE=<name>
# Never use `docker compose up` without --profile — all services are dormant by default.

networks:
  icarus-net:
    name: icarus-main-net
  ai-net:
    name: icarus-ai-net

volumes:
  icarus-postgres-data:
  icarus-redis-data:
  icarus-nextcloud-db-data:
  icarus-nextcloud-data:
  icarus-nextcloud-html:
  icarus-n8n-data:
  icarus-garage-meta:
  icarus-garage-data:
  icarus-searxng-cache:
  icarus-open-webui-data:
  icarus-openhands-data:
  icarus-changedetection-data:
  icarus-pihole-data:
  icarus-pihole-dnsmasq:
  icarus-coding-sandbox-claude:

# ---------------------------------------------------------------------------
# Infrastructure — Postgres 16
# ---------------------------------------------------------------------------
services:
  postgres:
    image: postgres:16-alpine
    container_name: icarus-postgres
    profiles: [postgres, n8n]
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_USER: icarus
      POSTGRES_DB: icarus
    volumes:
      - icarus-postgres-data:/var/lib/postgresql/data
      - ./services/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - icarus-net
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U icarus"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Infrastructure — Redis 7
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: icarus-redis
    profiles: [redis, n8n, nextcloud]
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - icarus-redis-data:/data
    networks:
      - icarus-net
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Nextcloud — dedicated MariaDB
  # MariaDB flags required by Nextcloud: READ-COMMITTED isolation + ROW binlog
  # ---------------------------------------------------------------------------
  nextcloud-db:
    image: mariadb:11-lts
    container_name: icarus-nextcloud-db
    profiles: [nextcloud]
    restart: unless-stopped
    command: >
      --transaction-isolation=READ-COMMITTED
      --log-bin=binlog
      --binlog-format=ROW
    environment:
      MYSQL_ROOT_PASSWORD: ${NEXTCLOUD_DB_ROOT_PASSWORD:?NEXTCLOUD_DB_ROOT_PASSWORD is required}
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: ${NEXTCLOUD_DB_PASSWORD:?NEXTCLOUD_DB_PASSWORD is required}
    volumes:
      - icarus-nextcloud-db-data:/var/lib/mysql
    networks:
      - icarus-net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Nextcloud
  # ---------------------------------------------------------------------------
  nextcloud:
    image: ${NEXTCLOUD_IMAGE:-nextcloud:30-apache}
    container_name: icarus-nextcloud
    profiles: [nextcloud]
    restart: unless-stopped
    depends_on:
      nextcloud-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      MYSQL_HOST: nextcloud-db
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: ${NEXTCLOUD_DB_PASSWORD:?NEXTCLOUD_DB_PASSWORD is required}
      NEXTCLOUD_TRUSTED_DOMAINS: ${NEXTCLOUD_TRUSTED_DOMAINS:-localhost}
      PHP_MEMORY_LIMIT: ${NEXTCLOUD_PHP_MEMORY_LIMIT:-1024M}
      PHP_UPLOAD_LIMIT: ${NEXTCLOUD_PHP_UPLOAD_LIMIT:-10G}
    volumes:
      - icarus-nextcloud-html:/var/www/html
      - icarus-nextcloud-data:/var/www/html/data
    networks:
      - icarus-net
    ports:
      - "127.0.0.1:8091:80"

  # ---------------------------------------------------------------------------
  # n8n — workflow automation
  # ---------------------------------------------------------------------------
  n8n:
    image: n8nio/n8n:latest
    container_name: icarus-n8n
    profiles: [n8n]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: icarus
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?N8N_ENCRYPTION_KEY is required}
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379
      QUEUE_BULL_REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      EXECUTIONS_MODE: queue
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
    volumes:
      - icarus-n8n-data:/home/node/.n8n
    networks:
      - icarus-net
    ports:
      - "127.0.0.1:5678:5678"

  # ---------------------------------------------------------------------------
  # SearXNG — private meta-search
  # Also reachable from ai-net via the network_mode alias below
  # ---------------------------------------------------------------------------
  searxng:
    image: searxng/searxng:latest
    container_name: icarus-searxng
    profiles: [searxng]
    restart: unless-stopped
    environment:
      SEARXNG_SECRET_KEY: ${SEARXNG_SECRET_KEY:?SEARXNG_SECRET_KEY is required}
      SEARXNG_BASE_URL: http://localhost:8888/
    volumes:
      - ./services/searxng/config:/etc/searxng:ro
      - icarus-searxng-cache:/etc/searxng/cache
    networks:
      icarus-net:
      ai-net:
        aliases:
          - icarus-searxng
    ports:
      - "127.0.0.1:8888:8080"

  # ---------------------------------------------------------------------------
  # Garage — S3-compatible object storage (single-node)
  # ---------------------------------------------------------------------------
  garage:
    image: dxflrs/garage:v1.0.1
    container_name: icarus-garage
    profiles: [garage]
    restart: unless-stopped
    environment:
      GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET:?GARAGE_RPC_SECRET is required}
      GARAGE_ADMIN_TOKEN: ${GARAGE_ADMIN_TOKEN:?GARAGE_ADMIN_TOKEN is required}
    volumes:
      - ./services/garage/garage.toml:/etc/garage.toml:ro
      - icarus-garage-meta:/var/lib/garage/meta
      - icarus-garage-data:/var/lib/garage/data
    networks:
      icarus-net:
      ai-net:
        aliases:
          - icarus-garage
    ports:
      - "127.0.0.1:3900:3900"
      - "127.0.0.1:3903:3903"

  # One-shot sidecar that bootstraps the Garage cluster layout on first run.
  # Exits after completion; subsequent runs are no-ops.
  garage-init:
    image: dxflrs/garage:v1.0.1
    container_name: icarus-garage-init
    profiles: [garage]
    restart: "no"
    depends_on:
      - garage
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        sleep 5
        NODE_ID=$(/garage -c /etc/garage.toml status 2>/dev/null | awk 'NR==2{print $1}')
        if [ -z "$$NODE_ID" ]; then echo "garage not ready"; exit 1; fi
        /garage -c /etc/garage.toml layout assign --zone local --capacity 50G $$NODE_ID || true
        /garage -c /etc/garage.toml layout apply --version 1 || echo "layout already applied"
        /garage -c /etc/garage.toml key create icarus-key 2>/dev/null || true
        /garage -c /etc/garage.toml bucket create icarus 2>/dev/null || true
        /garage -c /etc/garage.toml bucket allow icarus --read --write --key icarus-key 2>/dev/null || true
        echo "==> Garage init done. Run: docker exec icarus-garage /garage key info icarus-key"
    volumes:
      - ./services/garage/garage.toml:/etc/garage.toml:ro
    networks:
      - icarus-net

  # ---------------------------------------------------------------------------
  # Open WebUI — chat UI for local + cloud LLMs
  # On ai-net only; reaches Ollama on host via host.docker.internal
  # ---------------------------------------------------------------------------
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: icarus-open-webui
    profiles: [open-webui]
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      WEBUI_SECRET_KEY: ${OPEN_WEBUI_SECRET_KEY:?OPEN_WEBUI_SECRET_KEY is required}
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    volumes:
      - icarus-open-webui-data:/app/backend/data
    networks:
      - ai-net
    ports:
      - "127.0.0.1:3000:8080"

  # ---------------------------------------------------------------------------
  # OpenHands — autonomous AI agent sandbox
  # On ai-net only. Mounts Docker socket so it can spawn per-session containers.
  # This is the official deployment model — see ICARUS_LOCAL_PLAN.md §4.
  # It cannot reach postgres, redis, or nextcloud by hostname (ai-net isolation).
  # ---------------------------------------------------------------------------
  openhands:
    image: ghcr.io/all-hands-ai/openhands:main
    container_name: icarus-openhands
    profiles: [openhands]
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SANDBOX_RUNTIME_CONTAINER_IMAGE: docker.io/allhands-ai/runtime:main
      LOG_ALL_EVENTS: "true"
    volumes:
      # Docker socket required — OpenHands spawns per-session sandbox containers
      - /var/run/docker.sock:/var/run/docker.sock
      - icarus-openhands-data:/opt/workspace_base
    networks:
      - ai-net
    ports:
      - "127.0.0.1:3100:3000"

  # ---------------------------------------------------------------------------
  # BentoPDF — client-side PDF toolkit (stateless, no volume needed)
  # ---------------------------------------------------------------------------
  bentopdf:
    image: ghcr.io/bento-pdf/bento:latest
    container_name: icarus-bentopdf
    profiles: [bentopdf]
    restart: unless-stopped
    networks:
      - icarus-net
    ports:
      - "127.0.0.1:8090:3000"

  # ---------------------------------------------------------------------------
  # changedetection.io — webpage change monitoring
  # ---------------------------------------------------------------------------
  changedetection:
    image: ghcr.io/dgtlmoon/changedetection.io:latest
    container_name: icarus-changedetection
    profiles: [changedetection]
    restart: unless-stopped
    volumes:
      - icarus-changedetection-data:/datastore
    networks:
      - icarus-net
    ports:
      - "127.0.0.1:5000:5000"

  # ---------------------------------------------------------------------------
  # Glances — system resource monitor (stateless)
  # ---------------------------------------------------------------------------
  glances:
    image: nicolargo/glances:latest-full
    container_name: icarus-glances
    profiles: [glances]
    restart: unless-stopped
    pid: host
    environment:
      GLANCES_OPT: "-w"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - icarus-net
    ports:
      - "127.0.0.1:61208:61208"

  # ---------------------------------------------------------------------------
  # Pi-hole — system-wide DNS ad-blocker
  # Port 53 on macOS is localhost-only (cannot do LAN-wide DNS via Docker Desktop)
  # ---------------------------------------------------------------------------
  pihole:
    image: pihole/pihole:latest
    container_name: icarus-pihole
    profiles: [pihole]
    restart: unless-stopped
    environment:
      TZ: ${TZ:-UTC}
      WEBPASSWORD: ${PIHOLE_WEBPASSWORD:?PIHOLE_WEBPASSWORD is required}
      PIHOLE_DNS_: 1.1.1.1;1.0.0.1
    volumes:
      - icarus-pihole-data:/etc/pihole
      - icarus-pihole-dnsmasq:/etc/dnsmasq.d
    networks:
      - icarus-net
    ports:
      - "127.0.0.1:${PIHOLE_DNS_PORT:-53}:53/tcp"
      - "127.0.0.1:${PIHOLE_DNS_PORT:-53}:53/udp"
      - "127.0.0.1:8053:80"
    cap_add:
      - NET_ADMIN

  # ---------------------------------------------------------------------------
  # Coding Sandbox — Claude Code + Open Code dev environment
  # No exposed port — shell access only via: make shell SERVICE=coding-sandbox
  # Mounts CODING_WORKSPACE read-write; Claude config persisted in named volume
  # ---------------------------------------------------------------------------
  coding-sandbox:
    build:
      context: ./services/coding-sandbox
      dockerfile: Dockerfile
    image: icarus-coding-sandbox:latest
    container_name: icarus-coding-sandbox
    profiles: [coding-sandbox]
    restart: unless-stopped
    command: ["bash", "-c", "while true; do sleep 3600; done"]
    volumes:
      - ${CODING_WORKSPACE:-~/Dev}:/workspace
      - icarus-coding-sandbox-claude:/home/dev/.claude
    networks:
      - icarus-net
