# Garage single-node configuration
# RPC secret and admin token are injected via environment variables at runtime.

metadata_dir = "/var/lib/garage/meta"
data_dir = "/var/lib/garage/data"

replication_factor = 1

[rpc_secret_env]
# Read from GARAGE_RPC_SECRET env var
env = "GARAGE_RPC_SECRET"

[s3_api]
s3_region = "garage"
api_bind_addr = "0.0.0.0:3900"
root_domain = ".s3.localhost"

[s3_web]
bind_addr = "0.0.0.0:3902"
root_domain = ".web.localhost"
index = "index.html"

[admin]
api_bind_addr = "0.0.0.0:3903"
admin_token_env = "GARAGE_ADMIN_TOKEN"
